name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v

      - name: Run headless demo (smoke test)
        run: python examples/demo.py

  paper:
    name: Build JOSS paper draft (from paper-joss.md backup)
    runs-on: ubuntu-latest
    # Builds the JOSS-format backup paper so the December JOSS resubmission
    # always has a fresh PDF preview. The main paper.md is the academic-format
    # paper for arXiv / PeerJ CS and is built locally with pandoc.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify paper-joss.md and paper.bib exist
        run: |
          test -f paper-joss.md
          test -f paper.bib
          echo "paper-joss.md word count: $(wc -w < paper-joss.md)"

      - name: Build JOSS draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: paper-joss.md

      - name: Upload paper PDF
        uses: actions/upload-artifact@v5
        with:
          name: paper-joss-draft
          path: paper.pdf
